---
- name: "App | Create application directories"
  file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
  loop:
    - "{{ lxc_app_dir }}"
    - "{{ lxc_app_dir }}/logs"

- name: "App | Deploy docker-compose.yml"
  template:
    src: docker-compose.yml.j2
    dest: "{{ lxc_app_dir }}/docker-compose.yml"
    mode: "0640"

- name: "App | Deploy crontab"
  template:
    src: crontab.j2
    dest: "{{ lxc_app_dir }}/crontab"
    mode: "0644"

- name: "App | Deploy .env file"
  template:
    src: env.j2
    dest: "{{ lxc_app_dir }}/.env"
    mode: "0600"
  no_log: true

- name: "App | Pull latest images"
  command: docker compose pull
  args:
    chdir: "{{ lxc_app_dir }}"
  changed_when: false

- name: "App | Start containers"
  command: docker compose up -d
  args:
    chdir: "{{ lxc_app_dir }}"
  changed_when: true

# /actuator/health is permitAll() in SecurityConfiguration.kt — no auth needed
- name: "App | Wait for health check"
  uri:
    url: http://localhost:8080/actuator/health
    method: GET
    status_code: 200
  register: health
  until: health.status == 200
  retries: 12
  delay: 10
