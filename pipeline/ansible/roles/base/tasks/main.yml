---
- name: "Base | Update and upgrade packages"
  apt:
    update_cache: true
    upgrade: dist

- name: "Base | Install base packages"
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - unattended-upgrades
    state: present

- name: "Base | Configure DNS to use local Pi-hole"
  copy:
    dest: /etc/resolv.conf
    content: |
      nameserver {{ dns_nameserver }}
    mode: "0644"

- name: "Base | Prefer IPv4 over IPv6"
  lineinfile:
    path: /etc/gai.conf
    line: "precedence ::ffff:0:0/96  100"
    create: true

- name: "Base | Configure unattended-upgrades"
  copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades-gameserverbot
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}-security";
      };
      Unattended-Upgrade::Mail "";
      Unattended-Upgrade::MailReport "never";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-Time "04:00";
    mode: "0644"

- name: "Base | Enable unattended-upgrades service"
  systemd:
    name: unattended-upgrades
    enabled: true
    state: started
